teacher: ../ckpt/model.pt
pretrained: ../ckpt/model.pt
load_only_encoder: False
long_context: False
fixed_length: False
resume: Null
benchmark: False

fusion: crossattn
use_event: True
event_in_chans: 8
event_patch_size: Null
train_dino: True
dino_lr_scale: 0.05

# 这里设置每次训练采样帧数（例如 m~n 连续帧中的长度）
# num_views 作为上限，实际每个 global step 会在 [num_views_min, num_views_max] 随机采样一个值
num_views: 10
num_views_min: 6
num_views_max: 8
num_test_views: 1
n_corres_train: 0
n_corres_test: 0
allow_repeat: False
sample_mode: mixed
sequence_ratio: 0.5

train_criterion: DistillLoss()
test_criterion: DistillLoss()

# DL3DV 单数据集配置
# 连续帧采样关键参数：
# - min_interval=1, max_interval=1 -> 严格连续帧
# - video_prob=1.0 -> 始终走视频顺序分支
# - fix_interval_prob=1.0 -> 固定间隔
# - block_shuffle=None -> 不做 block 打乱
dataset1: DL3DV_ScreenEvent_Multi(
  allow_repeat=${allow_repeat},
  split='train',
  ROOT='/share/magic_group/aigc/fcr/EventVGGT/data/DL3DV_data/DL3DV',
  resolution=[(518, 392), (518, 336), (518, 294), (518, 266), (518, 210), (518, 154), (392, 518), (336, 518), (294, 518), (266, 518)],
  transform=SeqColorJitter,
  num_views=${num_views},
  min_interval=1,
  max_interval=1,
  sample_mode='${sample_mode}',
  sequence_ratio=${sequence_ratio},
  event_in_chans=8)

train_dataset: 10000 @ ${dataset1}
test_dataset: 1000 @ DL3DV_ScreenEvent_Multi(
  split='train',
  ROOT='/share/magic_group/aigc/fcr/EventVGGT/data/DL3DV_data/DL3DV',
  resolution=(518, 392),
  num_views=${num_test_views},
  seed=42,
  min_interval=1,
  max_interval=1,
  sample_mode='sequence',
  sequence_ratio=1.0,
  event_in_chans=8)

seed: 0
batch_size: 1
accum_iter: 1
gradient_checkpointing: False
epochs: 10
start_epoch: 0
start_step: 0
weight_decay: 0.05
lr: 1e-5
min_lr: 1e-7
warmup_epochs: 0.5
amp: 1

num_workers: 12
world_size: 1
local-rank: -1
dist_url: 'env://'
rank: 0
gpu: 0
distributed: False
dist_backend: 'nccl'

eval_freq: 1
save_freq: 0.1
max_checkpoints: 10
keep_freq: 1
print_freq: 10
print_img_freq: 50000000
num_imgs_vis: 4
save_dir: '../checkpoints'
exp_name: 'vggt_train_dl3dv'
task: 'VGGT'
logdir: ${save_dir}/${exp_name}/logs
output_dir: ${save_dir}/${exp_name}/
hydra:
  verbose: False
  run:
    dir: ${save_dir}/${exp_name}
